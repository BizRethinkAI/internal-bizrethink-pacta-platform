name: 'Continuous Integration'

on:
  workflow_call:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: ./.github/actions/node-install

      - name: Copy env
        run: cp .env.example .env

      # MODIFIED for BizRethink (overlay 059): exclude @documenso/docs from the
      # CI build. Pacta doesn't deploy the upstream Documenso docs site (per
      # CLAUDE.md; "apps/docs — docs site, probably skip deploying"). After
      # Phase 0's lockfile regen + Dependabot patches, the docs app's
      # transitive deps (@mdx-js/mdx, @fumadocs/ui CSS path) ended up broken.
      # Coolify builds via Docker which targets only apps/remix, so deploys
      # work — but `npm run build` at the monorepo root via Turborepo expands
      # to build every workspace including apps/docs, failing CI on every
      # push. Filtering it out via Turbo flag silences the false alarm and
      # still validates everything Pacta actually ships.
      - name: Build app
        run: npm run build -- --filter=!@documenso/docs

  build_docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          push: false
          context: .
          file: ./docker/Dockerfile
          tags: documenso-${{ github.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - # Temp fix
        # https://github.com/docker/build-push-action/issues/252
        # https://github.com/moby/buildkit/issues/1896
        name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
